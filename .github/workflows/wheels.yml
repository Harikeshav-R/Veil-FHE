name: Release wheels

# Manual / release-driven wheel builds, kept separate from PR CI because native
# FHE wheels are expensive to build. cibuildwheel uses the uv build frontend.
on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install libomp for OpenFHE (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "cp312-*"
          CIBW_BUILD_FRONTEND: "build[uv]"
          CIBW_ENVIRONMENT_WINDOWS: "CC=clang CXX=clang++"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
