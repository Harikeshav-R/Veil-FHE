name: Release wheels

# Manual / release-driven wheel builds, kept separate from PR CI because native
# FHE wheels are expensive to build. cibuildwheel uses the uv build frontend.
on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Install libomp for OpenFHE (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        env:
          CIBW_BUILD: "cp312-*"
          CIBW_BUILD_FRONTEND: "build[uv]"
          CIBW_ENVIRONMENT_WINDOWS: "CMAKE_ARGS='-T ClangCL'"
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
