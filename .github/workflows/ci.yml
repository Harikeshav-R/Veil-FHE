name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast feedback: lint + type-check. Installs deps + the dev group but NOT the
  # project itself (--no-install-project), so no OpenFHE build is needed here.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - run: uv sync --frozen --no-install-project
      - run: uv run --no-sync ruff check .
      - run: uv run --no-sync ruff format --check .
      - run: uv run --no-sync mypy veil

  # Native build + test. OpenFHE (built hermetically via FetchContent) is the
  # long pole, so ccache is wired in via CMAKE_ARGS and the uv cache is persisted.
  build-test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      # scikit-build-core honors CMAKE_ARGS; route OpenFHE's compile through ccache.
      CMAKE_ARGS: "-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: openfhe-${{ matrix.os }}

      - name: Install libomp for OpenFHE (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Set compilers for Windows (OpenFHE requires __int128, MSVC unsupported)
        if: runner.os == 'Windows'
        run: |
          echo "CMAKE_ARGS=$env:CMAKE_ARGS -T ClangCL" >> $env:GITHUB_ENV

      - name: Sync (builds veil_backend; hermetic OpenFHE via FetchContent)
        run: uv sync --frozen

      - name: Run tests
        run: uv run --no-sync pytest -q
