name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast feedback: lint + type-check. Installs deps + the dev group but NOT the
  # project itself (--no-install-project), so no OpenFHE build is needed here.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv sync --frozen --no-install-project
      - run: uv run --no-sync ruff check .
      - run: uv run --no-sync ruff format --check .
      - run: uv run --no-sync mypy veil

  # Native build + test. OpenFHE (built hermetically via FetchContent) is the
  # long pole, so ccache is wired in via CMAKE_ARGS and the uv cache is persisted.
  build-test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # CMAKE_ARGS is set per-OS below to avoid ccache on Windows VS generator
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up ccache
        if: runner.os != 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: openfhe-${{ matrix.os }}

      - name: Configure ccache for CMake (macOS/Ubuntu)
        if: runner.os != 'Windows'
        run: echo "CMAKE_ARGS=-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

      - name: Install libomp for OpenFHE (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set compilers for Windows (OpenFHE requires __int128, MSVC unsupported)
        if: runner.os == 'Windows'
        run: |
          echo "CMAKE_ARGS=-DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl -DWITH_OPENMP=OFF" >> $env:GITHUB_ENV
          echo "CMAKE_GENERATOR=Ninja" >> $env:GITHUB_ENV

      - name: Sync (builds veil_backend; hermetic OpenFHE via FetchContent)
        run: uv sync --frozen

      - name: Run tests
        run: uv run --no-sync pytest -q
