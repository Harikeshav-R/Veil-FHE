site_name: Veil-FHE
site_description: An educational, from-scratch FHE inference compiler built on CKKS / OpenFHE.
repo_url: https://github.com/Harikeshav-R/veil-fhe
repo_name: Harikeshav-R/veil-fhe

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Architecture: architecture.md
  - Supported ops: supported-ops.md
  - Threat model: threat-model.md
  - Benchmarks: benchmarks.md
  - FAQ: faq.md
